<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAI - Upload Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-lg rounded-xl p-10 w-full max-w-2xl">

        <h1 class="text-4xl font-bold text-center text-blue-600 mb-4">
            JobAI Resume Matcher
        </h1>

        <p class="text-center text-gray-600 mb-8">
            Upload your resume and get AI-powered job recommendations
        </p>

        <form action="/analyze" method="POST" enctype="multipart/form-data" class="space-y-6">

            <div>
                <label class="block text-sm font-medium mb-2">
                    Upload Resume (PDF / DOCX)
                </label>

                <input 
                    type="file" 
                    name="resume" 
                    accept=".pdf,.docx"
                    required
                    class="w-full border rounded-lg p-3"
                >
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">
                    Job Query (Optional)
                </label>

                <input 
                    type="text"
                    name="job_query"
                    placeholder="Machine Learning Engineer"
                    class="w-full border rounded-lg p-3"
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700"
            >
                Analyze Resume
            </button>

        </form>

    </div>

</body>
</html>
